<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>clock — spanani.de</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a; --bg1: #111111; --bg2: #181818; --bg3: #1e1e1e;
  --border: rgba(255,255,255,0.08); --bh: rgba(255,255,255,0.16);
  --text: #f0f0f0; --mu: #555555; --mu2: #2e2e2e;
  --ac: #e2e2e2; --ac-rgb: 226,226,226;
  --radius: 4px; --ease: cubic-bezier(0.16, 1, 0.3, 1);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-font-smoothing: antialiased; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'DM Mono', monospace; font-size: 13px; line-height: 1.6;
  min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden;
}
body.has-cursor { cursor: none; }
::selection { background: rgba(var(--ac-rgb), 0.2); }
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--mu2); border-radius: 3px; }

.noise {
  position: fixed; inset: 0; pointer-events: none; z-index: 9000; opacity: 0.02;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}
.grid-bg {
  position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.02;
  background-image: linear-gradient(rgba(255,255,255,0.06) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.06) 1px, transparent 1px);
  background-size: 80px 80px;
}
.ambient {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
  width: 600px; height: 600px; border-radius: 50%;
  background: radial-gradient(circle, rgba(var(--ac-rgb),0.03) 0%, transparent 70%);
  pointer-events: none; z-index: 0; filter: blur(40px); transition: background 0.5s;
}

#cur, #cur-ring { display: none; }
body.has-cursor #cur {
  display: block; position: fixed; width: 6px; height: 6px;
  background: var(--ac); border-radius: 50%; pointer-events: none; z-index: 9999;
  transform: translate(-50%,-50%); transition: width 0.2s var(--ease), height 0.2s var(--ease), opacity 0.3s;
  mix-blend-mode: difference;
}
body.has-cursor #cur.hide { opacity: 0; }
body.has-cursor #cur.expand { width: 12px; height: 12px; }
body.has-cursor #cur-ring {
  display: block; position: fixed; width: 32px; height: 32px;
  border: 1px solid rgba(var(--ac-rgb),0.25); border-radius: 50%;
  pointer-events: none; z-index: 9998; transform: translate(-50%,-50%);
  transition: width 0.25s var(--ease), height 0.25s var(--ease), opacity 0.3s;
}
body.has-cursor #cur-ring.hide { opacity: 0; }
body.has-cursor #cur-ring.expand { width: 52px; height: 52px; border-color: rgba(var(--ac-rgb),0.4); }

nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 48px; height: 64px; border-bottom: 1px solid var(--border);
  position: relative; z-index: 50; flex-shrink: 0;
}
.logo { font-family: 'Instrument Serif', serif; font-size: 20px; color: var(--text); text-decoration: none; transition: opacity 0.2s; }
.logo:hover { opacity: 0.7; }
.logo em { font-style: italic; color: var(--ac); }
.nr { display: flex; align-items: center; gap: 16px; }
.back { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--mu); text-decoration: none; display: flex; align-items: center; gap: 8px; transition: color 0.2s; }
.back:hover { color: var(--text); }
.color-controls { display: flex; align-items: center; gap: 10px; }
.presets-wrap { display: flex; align-items: center; gap: 5px; }
.preset { width: 16px; height: 16px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; transition: border-color 0.2s, transform 0.2s; }
.preset:hover { transform: scale(1.2); }
.preset.active { border-color: var(--text); }
.cpw { position: relative; display: flex; align-items: center; gap: 8px; padding: 7px 12px; border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; transition: border-color 0.2s; }
.cpw:hover { border-color: var(--bh); }
.cpsw { width: 11px; height: 11px; border-radius: 50%; background: var(--ac); flex-shrink: 0; transition: background 0.2s; }
.cplb { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--mu); }
input[type="color"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; border: none; }

main {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  padding: 40px 48px 60px; position: relative; gap: 0;
}

/* SYNC ROW */
.sync-row {
  display: flex; align-items: center; gap: 8px;
  font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--mu);
  margin-bottom: 24px; opacity: 0; animation: up 0.6s 0.2s forwards;
}
.sdot { width: 6px; height: 6px; border-radius: 50%; background: #f59e0b; animation: blink 1.5s infinite; flex-shrink: 0; transition: background 0.4s, box-shadow 0.4s; }
.sdot.ok { background: #3db87a; box-shadow: 0 0 8px rgba(61,184,122,0.6); }
.sdot.err { background: #ef4444; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

/* MAIN CLOCK */
.time-wrap { position: relative; display: flex; align-items: center; justify-content: center; margin-bottom: 8px; }
.day-progress { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: clamp(260px,50vw,480px); height: clamp(260px,50vw,480px); z-index: 0; pointer-events: none; opacity: 0; animation: up 1s 0.8s forwards; }
.day-progress svg { width: 100%; height: 100%; transform: rotate(-90deg); }
.day-progress .track { fill: none; stroke: var(--border); stroke-width: 1; }
.day-progress .fill { fill: none; stroke: var(--ac); stroke-width: 1.5; stroke-linecap: round; transition: stroke 0.3s, stroke-dashoffset 0.5s var(--ease); opacity: 0.2; }
.day-label { position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--mu2); white-space: nowrap; }

.time-block { text-align: center; opacity: 0; animation: up 0.8s 0.4s forwards; position: relative; z-index: 2; }
.time-main {
  font-family: 'Instrument Serif', serif;
  font-size: clamp(80px,18vw,200px); font-weight: 400;
  letter-spacing: -0.05em; line-height: 1; font-variant-numeric: tabular-nums;
}
.time-colon { color: var(--ac); display: inline-block; animation: colon-fade 1s ease-in-out infinite; }
@keyframes colon-fade { 0%,100%{opacity:1} 50%{opacity:0.2} }
.time-ms-row { font-size: clamp(18px,3vw,32px); color: var(--ac); font-variant-numeric: tabular-nums; letter-spacing: 0.08em; margin-top: 4px; opacity: 0.4; font-family: 'DM Mono', monospace; display: inline-block; min-width: 4.5ch; text-align: center; }

.date-row { font-size: 12px; color: var(--mu); letter-spacing: 0.15em; text-transform: uppercase; text-align: center; margin-bottom: 40px; opacity: 0; animation: up 0.6s 0.6s forwards; }

/* INFO STRIP */
.info-strip {
  display: flex; gap: 1px; background: var(--border);
  border: 1px solid var(--border); border-radius: 5px; overflow: hidden;
  margin-bottom: 24px; width: 100%; max-width: 720px;
  opacity: 0; animation: up 0.6s 0.9s forwards;
}
.ic { background: var(--bg1); padding: 18px 20px; flex: 1; text-align: center; transition: background 0.2s; min-width: 0; }
.ic:hover { background: var(--bg2); }
.icl { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--mu); margin-bottom: 5px; white-space: nowrap; }
.icv { font-size: 14px; font-weight: 500; color: var(--text); font-variant-numeric: tabular-nums; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.icv.ac { color: var(--ac); }

/* DEVICE OFFSET BOX */
.offset-box {
  width: 100%; max-width: 720px; margin-bottom: 32px;
  background: var(--bg1); border: 1px solid var(--border); border-radius: 5px;
  padding: 20px 24px; display: flex; align-items: center; justify-content: space-between; gap: 20px;
  opacity: 0; animation: up 0.6s 1.0s forwards; flex-wrap: wrap;
}
.offset-left { display: flex; align-items: center; gap: 12px; }
.offset-icon { color: var(--mu); flex-shrink: 0; }
.offset-label { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--mu); margin-bottom: 3px; }
.offset-val {
  font-family: 'Instrument Serif', serif; font-size: 28px;
  font-variant-numeric: tabular-nums; letter-spacing: -0.02em;
  color: var(--text); transition: color 0.4s;
}
.offset-val.good { color: #3db87a; }
.offset-val.warn { color: #f59e0b; }
.offset-val.bad  { color: #ef4444; }
.offset-bar-wrap { flex: 1; min-width: 120px; max-width: 260px; }
.offset-bar-track { height: 3px; background: var(--mu2); border-radius: 2px; position: relative; overflow: hidden; }
.offset-bar-fill { height: 100%; border-radius: 2px; background: var(--ac); transition: width 0.5s var(--ease), background 0.4s; width: 0%; }
.offset-desc { font-size: 11px; color: var(--mu); margin-top: 6px; }

/* TABS */
.tools-row {
  display: flex; gap: 8px; margin-bottom: 24px; width: 100%; max-width: 720px;
  opacity: 0; animation: up 0.6s 1.0s forwards;
}
.tool-tab {
  font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--mu); padding: 8px 16px;
  border: 1px solid var(--border); border-radius: var(--radius);
  background: transparent; cursor: pointer; transition: all 0.2s;
  font-family: 'DM Mono', monospace;
}
.tool-tab:hover { color: var(--text); border-color: var(--bh); }
.tool-tab.active { color: var(--ac); border-color: rgba(var(--ac-rgb),0.3); background: rgba(var(--ac-rgb),0.04); }

.tool-panel { width: 100%; max-width: 720px; display: none; }
.tool-panel.visible { display: block; animation: up 0.4s forwards; }

/* STOPWATCH */
.sw-display { text-align: center; margin-bottom: 20px; }
.sw-time { font-family: 'Instrument Serif', serif; font-size: clamp(36px,8vw,64px); font-weight: 400; letter-spacing: -0.03em; font-variant-numeric: tabular-nums; }
.sw-ms { font-size: clamp(16px,3vw,28px); color: var(--ac); opacity: 0.5; font-variant-numeric: tabular-nums; }
.sw-controls { display: flex; gap: 10px; justify-content: center; margin-bottom: 16px; }
.sw-btn { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; padding: 10px 20px; border-radius: var(--radius); border: 1px solid var(--border); background: transparent; color: var(--mu); cursor: pointer; transition: all 0.2s; }
.sw-btn:hover { color: var(--text); border-color: var(--bh); }
.sw-btn.primary { color: var(--ac); border-color: rgba(var(--ac-rgb),0.3); }
.sw-btn.danger { color: #ef4444; border-color: rgba(239,68,68,0.2); }
.sw-laps { max-height: 160px; overflow-y: auto; border: 1px solid var(--border); border-radius: var(--radius); }
.sw-laps:empty { display: none; }
.sw-lap { display: flex; justify-content: space-between; padding: 10px 16px; font-size: 12px; color: var(--mu); border-bottom: 1px solid var(--border); }
.sw-lap:last-child { border-bottom: none; }
.sw-lap span:first-child { font-size: 10px; color: var(--mu2); letter-spacing: 0.1em; }
.sw-lap span:last-child { font-variant-numeric: tabular-nums; color: var(--text); }
.sw-lap.best span:last-child { color: #3db87a; }
.sw-lap.worst span:last-child { color: #ef4444; }

/* TIMER */
.timer-setup { display: flex; gap: 12px; justify-content: center; align-items: center; margin-bottom: 20px; }
.timer-input-group { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.timer-input-group label { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--mu); }
.timer-input { width: 64px; text-align: center; font-family: 'Instrument Serif', serif; font-size: 32px; background: var(--bg1); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); padding: 8px 4px; outline: none; cursor: pointer; font-variant-numeric: tabular-nums; -moz-appearance: textfield; }
.timer-input::-webkit-inner-spin-button, .timer-input::-webkit-outer-spin-button { -webkit-appearance: none; }
.timer-input:focus { border-color: rgba(var(--ac-rgb),0.4); }
.timer-sep { font-family: 'Instrument Serif', serif; font-size: 32px; color: var(--mu2); margin-top: 14px; }
.timer-display { text-align: center; margin-bottom: 20px; display: none; }
.timer-time { font-family: 'Instrument Serif', serif; font-size: clamp(36px,8vw,64px); font-weight: 400; letter-spacing: -0.03em; font-variant-numeric: tabular-nums; }
.timer-time.urgent { color: #ef4444; animation: pulse 0.5s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
.timer-controls { display: flex; gap: 10px; justify-content: center; }

/* GLOBE */
.globe-wrap {
  width: 100%; max-width: 720px; margin-bottom: 32px;
  border: 1px solid var(--border); border-radius: 5px; overflow: hidden;
  background: var(--bg1);
  opacity: 0; animation: up 0.6s 1.1s forwards;
}
.globe-header {
  padding: 16px 24px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.globe-title { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--mu); }
.globe-hint { font-size: 10px; color: var(--mu2); }
.globe-container { position: relative; height: 340px; overflow: hidden; }
canvas#globe { display: block; width: 100%; height: 100%; cursor: grab; }
canvas#globe:active { cursor: grabbing; }
.globe-cities {
  position: absolute; inset: 0; pointer-events: none;
}
.city-pin {
  position: absolute; transform: translate(-50%, -50%);
  display: flex; flex-direction: column; align-items: center;
  pointer-events: none; transition: opacity 0.3s;
}
.city-dot {
  width: 5px; height: 5px; background: var(--ac); border-radius: 50%;
  box-shadow: 0 0 6px rgba(var(--ac-rgb),0.5);
  margin-bottom: 3px; flex-shrink: 0;
}
.city-name { font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text); white-space: nowrap; text-shadow: 0 1px 3px rgba(0,0,0,0.8); }
.city-time { font-size: 10px; color: var(--ac); white-space: nowrap; text-shadow: 0 1px 3px rgba(0,0,0,0.8); font-variant-numeric: tabular-nums; }

footer {
  border-top: 1px solid var(--border); padding: 24px 48px;
  display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; position: relative; z-index: 50;
}
footer span, footer a { font-size: 11px; color: var(--mu); text-decoration: none; transition: color 0.2s; }
footer a:hover { color: var(--text); }
.egg { width: 7px; height: 7px; background: var(--mu2); border-radius: 50%; transition: all 0.3s; cursor: pointer; display: inline-block; }
.egg:hover { background: var(--ac); transform: scale(1.6); box-shadow: 0 0 10px rgba(var(--ac-rgb),0.4); }

@keyframes up { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:none} }

@media (max-width: 768px) {
  nav { padding: 0 24px; }
  .cplb { display: none; }
  .presets-wrap { display: none; }
  main { padding: 30px 20px 40px; }
  footer { padding: 20px 24px; flex-wrap: wrap; gap: 10px; }
  .ic { padding: 14px 10px; }
  .offset-box { padding: 16px 18px; }
  .globe-container { height: 260px; }
  .info-strip { flex-wrap: wrap; }
  .ic { flex: 1 1 45%; }
}
</style>
</head>
<body>
<div class="noise"></div>
<div class="grid-bg"></div>
<div class="ambient"></div>
<div id="cur"></div>
<div id="cur-ring"></div>

<nav>
  <a href="/" class="logo">span<em>ani</em></a>
  <div class="nr">
    <a href="/" class="back">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M8 2L4 6l4 4" stroke="currentColor" stroke-width="1.4"/></svg>
      portfolio
    </a>
    <div class="color-controls">
      <div class="presets-wrap" id="presets">
        <div class="preset active" style="background:#e2e2e2" data-color="#e2e2e2"></div>
        <div class="preset" style="background:#6ee7b7" data-color="#6ee7b7"></div>
        <div class="preset" style="background:#93c5fd" data-color="#93c5fd"></div>
        <div class="preset" style="background:#c4b5fd" data-color="#c4b5fd"></div>
        <div class="preset" style="background:#fca5a5" data-color="#fca5a5"></div>
        <div class="preset" style="background:#fcd34d" data-color="#fcd34d"></div>
        <div class="preset" style="background:#fdba74" data-color="#fdba74"></div>
      </div>
      <div class="cpw">
        <div class="cpsw" id="sw"></div>
        <span class="cplb">color</span>
        <input type="color" id="cp" value="#e2e2e2">
      </div>
    </div>
  </div>
</nav>

<main>
  <div class="sync-row">
    <div class="sdot" id="sdot"></div>
    <span id="syncStatus">syncing with ntp servers…</span>
  </div>

  <div class="time-wrap">
    <div class="day-progress">
      <svg viewBox="0 0 200 200">
        <circle class="track" cx="100" cy="100" r="95"/>
        <circle class="fill" id="dayRing" cx="100" cy="100" r="95" stroke-dasharray="596.9" stroke-dashoffset="596.9"/>
      </svg>
      <div class="day-label" id="dayLabel">0% of day</div>
    </div>
    <div class="time-block">
      <div class="time-main">
        <span id="H">--</span><span class="time-colon">:</span><span id="M">--</span><span class="time-colon">:</span><span id="S">--</span>
      </div>
      <div class="time-ms-row" id="msRow">.000</div>
    </div>
  </div>

  <div class="date-row" id="dateRow">— — —</div>

  <div class="info-strip">
    <div class="ic"><div class="icl">Timezone</div><div class="icv ac" id="infoTz">—</div></div>
    <div class="ic"><div class="icl">UTC Offset</div><div class="icv" id="infoOff">—</div></div>
    <div class="ic"><div class="icl">Latency</div><div class="icv" id="infoLat">—</div></div>
    <div class="ic"><div class="icl">Accuracy</div><div class="icv ac" id="infoAcc">—</div></div>
    <div class="ic"><div class="icl">Unix</div><div class="icv" id="infoUnix">—</div></div>
  </div>

  <!-- DEVICE OFFSET -->
  <div class="offset-box">
    <div class="offset-left">
      <div class="offset-icon">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <rect x="4" y="3" width="12" height="14" rx="2" stroke="currentColor" stroke-width="1.2"/>
          <line x1="7" y1="6" x2="13" y2="6" stroke="currentColor" stroke-width="1"/>
          <line x1="7" y1="9" x2="13" y2="9" stroke="currentColor" stroke-width="1"/>
          <line x1="7" y1="12" x2="10" y2="12" stroke="currentColor" stroke-width="1"/>
        </svg>
      </div>
      <div>
        <div class="offset-label">Your Device vs Atomic Time</div>
        <div class="offset-val" id="offsetVal">—</div>
      </div>
    </div>
    <div class="offset-bar-wrap">
      <div class="offset-bar-track">
        <div class="offset-bar-fill" id="offsetBar"></div>
      </div>
      <div class="offset-desc" id="offsetDesc">waiting for sync…</div>
    </div>
  </div>

  <!-- TABS -->
  <div class="tools-row">
    <button class="tool-tab active" data-panel="none">Clock</button>
    <button class="tool-tab" data-panel="stopwatch">Stopwatch</button>
    <button class="tool-tab" data-panel="timer">Timer</button>
  </div>

  <div class="tool-panel" id="panelStopwatch">
    <div class="sw-display">
      <span class="sw-time" id="swTime">00:00:00</span><span class="sw-ms" id="swMs">.000</span>
    </div>
    <div class="sw-controls">
      <button class="sw-btn primary" id="swStart">Start</button>
      <button class="sw-btn" id="swLap">Lap</button>
      <button class="sw-btn danger" id="swReset">Reset</button>
    </div>
    <div class="sw-laps" id="swLaps"></div>
  </div>

  <div class="tool-panel" id="panelTimer">
    <div class="timer-setup" id="timerSetup">
      <div class="timer-input-group"><label>Hours</label><input type="number" class="timer-input" id="timerH" value="0" min="0" max="99"></div>
      <span class="timer-sep">:</span>
      <div class="timer-input-group"><label>Minutes</label><input type="number" class="timer-input" id="timerM" value="5" min="0" max="59"></div>
      <span class="timer-sep">:</span>
      <div class="timer-input-group"><label>Seconds</label><input type="number" class="timer-input" id="timerS" value="0" min="0" max="59"></div>
    </div>
    <div class="timer-display" id="timerDisplay"><div class="timer-time" id="timerTime">00:05:00</div></div>
    <div class="timer-controls">
      <button class="sw-btn primary" id="timerStart">Start</button>
      <button class="sw-btn danger" id="timerReset">Reset</button>
    </div>
  </div>

  <!-- GLOBE -->
  <div class="globe-wrap">
    <div class="globe-header">
      <span class="globe-title">world clocks · atomic time</span>
      <span class="globe-hint">drag to rotate</span>
    </div>
    <div class="globe-container">
      <canvas id="globe"></canvas>
      <div class="globe-cities" id="globeCities"></div>
    </div>
  </div>
</main>

<footer>
  <a href="/">spanani.de</a>
  <span>atomic time · ntp synced</span>

<script>
(function(){
'use strict';
const $=s=>document.querySelector(s);
const $$=s=>[...document.querySelectorAll(s)];
const pad=(n,d=2)=>String(n).padStart(d,'0');
const lerp=(a,b,t)=>a+(b-a)*t;
const root=document.documentElement;

const isTouch=('ontouchstart' in window)||navigator.maxTouchPoints>0;
if(!isTouch) document.body.classList.add('has-cursor');

// Color
const cp=$('#cp'),sw=$('#sw');
function h2r(h){return parseInt(h.slice(1,3),16)+','+parseInt(h.slice(3,5),16)+','+parseInt(h.slice(5,7),16)}
function getAcHex(){return getComputedStyle(root).getPropertyValue('--ac').trim();}
function applyColor(hex){
  root.style.setProperty('--ac',hex);root.style.setProperty('--ac-rgb',h2r(hex));
  sw.style.background=hex;cp.value=hex;
  $$('.preset').forEach(p=>p.classList.toggle('active',p.dataset.color.toLowerCase()===hex.toLowerCase()));
  try{localStorage.setItem('spa-ac',hex)}catch(e){}
}
try{const s=localStorage.getItem('spa-ac');if(s)applyColor(s)}catch(e){}
cp.addEventListener('input',e=>applyColor(e.target.value));
$$('.preset').forEach(p=>p.addEventListener('click',()=>applyColor(p.dataset.color)));

// Cursor
if(!isTouch){
  const cur=$('#cur'),ring=$('#cur-ring');
  let mx=-100,my=-100,rx=-100,ry=-100,vis=false;
  document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cur.style.left=mx+'px';cur.style.top=my+'px';if(!vis){vis=true;cur.classList.remove('hide');ring.classList.remove('hide')}});
  document.addEventListener('mouseleave',()=>{vis=false;cur.classList.add('hide');ring.classList.add('hide')});
  document.addEventListener('mouseenter',()=>{vis=true;cur.classList.remove('hide');ring.classList.remove('hide')});
  (function a(){rx=lerp(rx,mx,0.12);ry=lerp(ry,my,0.12);ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(a)})();
  $$('a,button,.cpw,.preset').forEach(el=>{
    el.addEventListener('mouseenter',()=>{cur.classList.add('expand');ring.classList.add('expand')});
    el.addEventListener('mouseleave',()=>{cur.classList.remove('expand');ring.classList.remove('expand')});
  });
}

// NTP Sync
let ntpOff=0,latMs=0,synced=false,deviceOff=0;
let userTz=Intl.DateTimeFormat().resolvedOptions().timeZone;

async function syncNTP(){
  const dot=$('#sdot'),status=$('#syncStatus');
  dot.className='sdot';status.textContent='syncing with ntp servers…';
  const deviceBefore=Date.now();
  const samples=[];
  for(let i=0;i<5;i++){
    try{const t0=Date.now();const res=await fetch('https://worldtimeapi.org/api/ip?_='+Date.now(),{cache:'no-store'});const t1=Date.now();if(!res.ok)continue;const d=await res.json();const rtt=t1-t0;userTz=d.timezone||userTz;samples.push({offset:(new Date(d.datetime).getTime()+rtt/2)-t1,rtt})}catch(e){}
    if(i<4)await new Promise(r=>setTimeout(r,200));
  }
  if(!samples.length){
    try{const t0=Date.now();const res=await fetch('https://timeapi.io/api/time/current/zone?timeZone=UTC');const t1=Date.now();
      if(res.ok){const d=await res.json();ntpOff=(new Date(d.dateTime+'Z').getTime()+(t1-t0)/2)-t1;latMs=Math.round((t1-t0)/2);synced=true}}
    catch(e){dot.className='sdot err';status.textContent='ntp unavailable — device time';$('#infoAcc').textContent='device';updateDeviceOffset(0);return}
  }else{
    samples.sort((a,b)=>a.rtt-b.rtt);const med=samples[Math.floor(samples.length/2)].rtt;
    const good=samples.filter(s=>s.rtt<=med*2.5);let tw=0,wo=0;
    good.forEach(s=>{const w=1/s.rtt;wo+=s.offset*w;tw+=w});
    ntpOff=Math.round(wo/tw);latMs=Math.round(samples[0].rtt/2);synced=true;
  }
  dot.className='sdot ok';status.textContent='synced · '+userTz;
  // deviceOff = how much device differs from atomic
  deviceOff=ntpOff; // ntpOff is (atomic - device), so positive = device behind
  updateDeviceOffset(deviceOff);
  $('#infoTz').textContent=userTz;
  const rawOff=new Date().getTimezoneOffset();const h=Math.abs(Math.floor(rawOff/60)),m=Math.abs(rawOff%60);
  $('#infoOff').textContent='UTC'+(rawOff<=0?'+':'−')+pad(h)+':'+pad(m);
  $('#infoLat').textContent=latMs+'ms';
  $('#infoAcc').textContent=latMs<20?'±5ms':latMs<60?'±20ms':latMs<120?'±50ms':'±100ms';
}

function updateDeviceOffset(offMs){
  const val=$('#offsetVal'),bar=$('#offsetBar'),desc=$('#offsetDesc');
  const abs=Math.abs(offMs);
  const sign=offMs>0?'+':offMs<0?'-':'';
  if(abs<50){val.className='offset-val good';val.textContent=sign+abs+'ms';desc.textContent='Your device is accurate — great!';}
  else if(abs<500){val.className='offset-val warn';val.textContent=sign+abs+'ms';desc.textContent='Slightly off — normal for most devices.';}
  else if(abs<5000){val.className='offset-val warn';val.textContent=sign+(abs/1000).toFixed(2)+'s';desc.textContent='Noticeable drift — consider syncing.';}
  else{val.className='offset-val bad';val.textContent=sign+(abs/1000).toFixed(1)+'s';desc.textContent='Significant drift — your clock is wrong.';}
  // bar: 0ms=0%, 2000ms=100%
  const pct=Math.min(100, abs/20);
  bar.style.width=pct+'%';
  bar.style.background=abs<50?'#3db87a':abs<500?'#f59e0b':'#ef4444';
}

// Clock tick
const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const CIRC=2*Math.PI*95;
const elH=$('#H'),elM=$('#M'),elS=$('#S'),elMs=$('#msRow'),elDate=$('#dateRow');
const elDayRing=$('#dayRing'),elDayLabel=$('#dayLabel'),elUnix=$('#infoUnix');
let lastSec=-1;

function tick(){
  const ts=Date.now()+ntpOff;const now=new Date(ts);
  const h=now.getHours(),m=now.getMinutes(),s=now.getSeconds(),ms=now.getMilliseconds();
  if(s!==lastSec){
    lastSec=s;elH.textContent=pad(h);elM.textContent=pad(m);elS.textContent=pad(s);
    elDate.textContent=DAYS[now.getDay()]+', '+now.getDate()+' '+MONTHS[now.getMonth()]+' '+now.getFullYear();
    const totalSec=h*3600+m*60+s;const pct=totalSec/86400;
    elDayRing.style.strokeDashoffset=CIRC*(1-pct);
    elDayLabel.textContent=Math.round(pct*100)+'% of day';
    elUnix.textContent=Math.floor(ts/1000);
  }
  elMs.textContent='.'+pad(ms,3);
}
syncNTP().then(()=>{tick();setInterval(tick,16);setInterval(syncNTP,5*60000)});

// Tabs
const tabs=$$('.tool-tab'),panelSw=$('#panelStopwatch'),panelTimer=$('#panelTimer');
function switchTab(p){tabs.forEach(t=>t.classList.toggle('active',t.dataset.panel===p));panelSw.classList.toggle('visible',p==='stopwatch');panelTimer.classList.toggle('visible',p==='timer')}
tabs.forEach(t=>t.addEventListener('click',()=>switchTab(t.dataset.panel)));

// Stopwatch
let swRunning=false,swStartT=0,swElapsed=0,swRaf=null,swLapsArr=[];
const swTimeEl=$('#swTime'),swMsEl=$('#swMs'),swLapsEl=$('#swLaps');
function fmtSw(ms){const t=Math.floor(ms/1000);return pad(Math.floor(t/3600))+':'+pad(Math.floor(t%3600/60))+':'+pad(t%60)}
function updateSw(){if(!swRunning)return;const t=swElapsed+(performance.now()-swStartT);swTimeEl.textContent=fmtSw(t);swMsEl.textContent='.'+pad(Math.floor(t%1000),3);swRaf=requestAnimationFrame(updateSw)}
$('#swStart').addEventListener('click',()=>{
  if(!swRunning){swRunning=true;swStartT=performance.now();$('#swStart').textContent='Stop';updateSw()}
  else{swRunning=false;swElapsed+=performance.now()-swStartT;cancelAnimationFrame(swRaf);$('#swStart').textContent='Start'}
});
$('#swLap').addEventListener('click',()=>{if(!swRunning)return;swLapsArr.push(swElapsed+(performance.now()-swStartT));renderLaps()});
$('#swReset').addEventListener('click',()=>{swRunning=false;swElapsed=0;swLapsArr=[];cancelAnimationFrame(swRaf);swTimeEl.textContent='00:00:00';swMsEl.textContent='.000';swLapsEl.innerHTML='';$('#swStart').textContent='Start'});
function renderLaps(){if(!swLapsArr.length){swLapsEl.innerHTML='';return}const lt=swLapsArr.map((t,i)=>i===0?t:t-swLapsArr[i-1]);const best=Math.min(...lt),worst=Math.max(...lt);let html='';for(let i=swLapsArr.length-1;i>=0;i--){const l=lt[i];let cls='';if(swLapsArr.length>=3){if(l===best)cls=' best';else if(l===worst)cls=' worst'}html+=`<div class="sw-lap${cls}"><span>LAP ${pad(i+1)}</span><span>${fmtSw(l)}.${pad(Math.floor(l%1000),3)}</span></div>`}swLapsEl.innerHTML=html}

// Timer
let timerRunning=false,timerEnd=0,timerRemaining=0,timerRaf=null;
const timerSetup=$('#timerSetup'),timerDisplay=$('#timerDisplay'),timerTimeEl=$('#timerTime');
function getTimerSec(){return(parseInt($('#timerH').value)||0)*3600+(parseInt($('#timerM').value)||0)*60+(parseInt($('#timerS').value)||0)}
function fmtTimer(s){return pad(Math.floor(s/3600))+':'+pad(Math.floor(s%3600/60))+':'+pad(s%60)}
function updateTimer(){if(!timerRunning)return;const rem=Math.max(0,timerEnd-Date.now());const s=Math.ceil(rem/1000);timerTimeEl.textContent=fmtTimer(s);timerTimeEl.classList.toggle('urgent',s<=10&&s>0);if(rem<=0){timerRunning=false;timerTimeEl.textContent='00:00:00';timerTimeEl.classList.remove('urgent');$('#timerStart').textContent='Start';try{if(Notification.permission==='granted')new Notification('Timer done!')}catch(e){}return}timerRaf=requestAnimationFrame(updateTimer)}
$('#timerStart').addEventListener('click',()=>{
  if(!timerRunning){let ms;if(timerRemaining>0)ms=timerRemaining;else{const s=getTimerSec();if(s<=0)return;ms=s*1000}timerEnd=Date.now()+ms;timerRunning=true;timerSetup.style.display='none';timerDisplay.style.display='block';$('#timerStart').textContent='Pause';try{if(Notification.permission==='default')Notification.requestPermission()}catch(e){}updateTimer()}
  else{timerRunning=false;timerRemaining=Math.max(0,timerEnd-Date.now());cancelAnimationFrame(timerRaf);$('#timerStart').textContent='Resume'}
});
$('#timerReset').addEventListener('click',()=>{timerRunning=false;timerRemaining=0;cancelAnimationFrame(timerRaf);timerSetup.style.display='';timerDisplay.style.display='none';timerTimeEl.textContent='00:00:00';timerTimeEl.classList.remove('urgent');$('#timerStart').textContent='Start'});

// ============ GLOBE ============
const CITIES=[
  {name:'New York', tz:'America/New_York', lat:40.71, lon:-74.01},
  {name:'London',   tz:'Europe/London',    lat:51.51, lon:-0.13},
  {name:'Berlin',   tz:'Europe/Berlin',    lat:52.52, lon:13.40},
  {name:'Dubai',    tz:'Asia/Dubai',       lat:25.20, lon:55.27},
  {name:'Tokyo',    tz:'Asia/Tokyo',       lat:35.68, lon:139.69},
  {name:'Sydney',   tz:'Australia/Sydney', lat:-33.87, lon:151.21},
  {name:'São Paulo',tz:'America/Sao_Paulo',lat:-23.55, lon:-46.63},
  {name:'LA',       tz:'America/Los_Angeles',lat:34.05, lon:-118.24},
  {name:'Mumbai',   tz:'Asia/Kolkata',     lat:19.08, lon:72.88},
  {name:'Beijing',  tz:'Asia/Shanghai',    lat:39.91, lon:116.39},
];

const canvas=$('#globe');
const ctx=canvas.getContext('2d');
const container=canvas.parentElement;

let rotY=0, rotX=0.2;
let dragActive=false, lastX=0, lastY=0, velX=0, velY=0;
let acColor=[226,226,226];

function parseAcRgb(){
  try{const s=getComputedStyle(root).getPropertyValue('--ac-rgb').trim();const p=s.split(',').map(Number);if(p.length===3)acColor=p}catch(e){}
}

function resize(){
  const r=container.getBoundingClientRect();
  const dpr=window.devicePixelRatio||1;
  canvas.width=r.width*dpr;canvas.height=r.height*dpr;
  canvas.style.width=r.width+'px';canvas.style.height=r.height+'px';
  ctx.scale(dpr,dpr);
}
resize();
window.addEventListener('resize',resize);

// Drag
canvas.addEventListener('mousedown',e=>{dragActive=true;lastX=e.clientX;lastY=e.clientY;velX=0;velY=0});
window.addEventListener('mousemove',e=>{if(!dragActive)return;const dx=e.clientX-lastX,dy=e.clientY-lastY;rotY+=dx*0.005;rotX+=dy*0.003;rotX=Math.max(-1.2,Math.min(1.2,rotX));velX=dx*0.005;velY=dy*0.003;lastX=e.clientX;lastY=e.clientY});
window.addEventListener('mouseup',()=>{dragActive=false});
canvas.addEventListener('touchstart',e=>{dragActive=true;lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;velX=0;velY=0},{passive:true});
canvas.addEventListener('touchmove',e=>{if(!dragActive)return;const dx=e.touches[0].clientX-lastX,dy=e.touches[0].clientY-lastY;rotY+=dx*0.005;rotX+=dy*0.003;rotX=Math.max(-1.2,Math.min(1.2,rotX));velX=dx*0.005;velY=dy*0.003;lastX=e.touches[0].clientX;lastY=e.touches[0].clientY},{passive:true});
canvas.addEventListener('touchend',()=>{dragActive=false});

function latLonTo3D(lat,lon){
  const phi=(90-lat)*Math.PI/180;
  const theta=(lon+180)*Math.PI/180;
  return{x:Math.sin(phi)*Math.cos(theta),y:Math.cos(phi),z:Math.sin(phi)*Math.sin(theta)};
}

function rotate3D(pt){
  // rotate around Y
  const cosY=Math.cos(rotY),sinY=Math.sin(rotY);
  let x=pt.x*cosY-pt.z*sinY;let z=pt.x*sinY+pt.z*cosY;let y=pt.y;
  // rotate around X
  const cosX=Math.cos(rotX),sinX=Math.sin(rotX);
  let ny=y*cosX-z*sinX;let nz=y*sinX+z*cosX;
  return{x,y:ny,z:nz};
}

// Graticule lines
function makeGraticule(){
  const lines=[];
  for(let lon=-180;lon<=180;lon+=30){const pts=[];for(let lat=-90;lat<=90;lat+=5)pts.push(latLonTo3D(lat,lon));lines.push(pts)}
  for(let lat=-60;lat<=60;lat+=30){const pts=[];for(let lon=-180;lon<=180;lon+=5)pts.push(latLonTo3D(lat,lon));lines.push(pts)}
  return lines;
}
const graticule=makeGraticule();

function drawGlobe(){
  parseAcRgb();
  const W=canvas.offsetWidth,H=canvas.offsetHeight;
  const cx=W/2,cy=H/2;
  const R=Math.min(W,H)*0.38;
  ctx.clearRect(0,0,W,H);

  // Inertia
  if(!dragActive){rotY+=velX*0.95;velX*=0.93;velY*=0.93;}

  // Outer glow
  const grd=ctx.createRadialGradient(cx,cy,R*0.85,cx,cy,R*1.1);
  grd.addColorStop(0,`rgba(${acColor[0]},${acColor[1]},${acColor[2]},0.04)`);
  grd.addColorStop(1,`rgba(${acColor[0]},${acColor[1]},${acColor[2]},0)`);
  ctx.beginPath();ctx.arc(cx,cy,R*1.1,0,Math.PI*2);ctx.fillStyle=grd;ctx.fill();

  // Sphere background
  ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);
  ctx.fillStyle='#0d0d0d';ctx.fill();
  ctx.strokeStyle=`rgba(${acColor[0]},${acColor[1]},${acColor[2]},0.08)`;ctx.lineWidth=1;ctx.stroke();

  // Night side
  const sunLon=(Date.now()/1000/86400*360)%360-180; // approximate sun lon
  const nightGrd=ctx.createRadialGradient(cx-R*0.3,cy,0,cx,cy,R);
  nightGrd.addColorStop(0,'rgba(0,0,0,0)');
  nightGrd.addColorStop(0.6,'rgba(0,0,0,0)');
  nightGrd.addColorStop(1,'rgba(0,0,0,0.5)');
  ctx.save();ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.clip();
  ctx.fillStyle=nightGrd;ctx.fillRect(cx-R,cy-R,R*2,R*2);ctx.restore();

  // Graticule
  ctx.save();ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.clip();
  ctx.strokeStyle=`rgba(${acColor[0]},${acColor[1]},${acColor[2]},0.05)`;ctx.lineWidth=0.6;
  for(const line of graticule){
    let first=true;
    for(const pt of line){
      const r=rotate3D(pt);
      const sx=cx+r.x*R,sy=cy-r.y*R;
      if(r.z<0){first=true;continue}
      if(first){ctx.beginPath();ctx.moveTo(sx,sy);first=false}else ctx.lineTo(sx,sy);
    }
    ctx.stroke();
  }
  ctx.restore();

  // City dots & labels
  const cityPins=$('#globeCities');
  if(cityPins) cityPins.innerHTML='';

  for(const city of CITIES){
    const pt=latLonTo3D(city.lat,city.lon);
    const r=rotate3D(pt);
    if(r.z<0) continue; // behind globe

    const sx=cx+r.x*R,sy=cy-r.y*R;
    // dot on canvas
    ctx.beginPath();ctx.arc(sx,sy,3,0,Math.PI*2);
    ctx.fillStyle=`rgba(${acColor[0]},${acColor[1]},${acColor[2]},0.9)`;ctx.fill();
    ctx.beginPath();ctx.arc(sx,sy,5,0,Math.PI*2);
    ctx.strokeStyle=`rgba(${acColor[0]},${acColor[1]},${acColor[2]},0.25)`;ctx.lineWidth=1;ctx.stroke();

    // overlay label
    if(cityPins){
      const now=new Date(Date.now()+ntpOff);
      let timeStr='--:--';
      try{timeStr=now.toLocaleTimeString('en-GB',{timeZone:city.tz,hour:'2-digit',minute:'2-digit',hour12:false})}catch(e){}
      const cRect=container.getBoundingClientRect();
      const pin=document.createElement('div');
      pin.className='city-pin';
      // position relative to canvas
      const px=sx/W*cRect.width, py=sy/H*cRect.height;
      pin.style.left=px+'px';pin.style.top=py+'px';
      pin.innerHTML=`<div class="city-time">${timeStr}</div><div class="city-name">${city.name}</div>`;
      if(cityPins)cityPins.appendChild(pin);
    }
  }

  requestAnimationFrame(drawGlobe);
}
requestAnimationFrame(drawGlobe);

// Keyboard
document.addEventListener('keydown',e=>{
  const tag=document.activeElement.tagName;if(tag==='INPUT'||tag==='TEXTAREA')return;
  switch(e.key){
    case ' ':e.preventDefault();if(panelSw.classList.contains('visible'))$('#swStart').click();break;
    case 'l':case'L':if(panelSw.classList.contains('visible'))$('#swLap').click();break;
    case 'r':case'R':if(panelSw.classList.contains('visible'))$('#swReset').click();if(panelTimer.classList.contains('visible'))$('#timerReset').click();break;
    case 'f':case'F':e.preventDefault();if(!document.fullscreenElement)document.documentElement.requestFullscreen().catch(()=>{});else document.exitFullscreen().catch(()=>{});break;
    case '1':switchTab('none');break;case '2':switchTab('stopwatch');break;case '3':switchTab('timer');break;
  }
});

document.addEventListener('visibilitychange',()=>{if(!document.hidden)tick()});
})();
</script>
