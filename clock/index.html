<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>clock — spanani.de</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0a;--bg1:#111;--bg2:#181818;--border:rgba(255,255,255,0.08);--bh:rgba(255,255,255,0.16);--text:#f0f0f0;--mu:#555;--ac:#e2e2e2;--ac-rgb:226,226,226}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;font-size:13px;line-height:1.6;min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden;cursor:none}
#cur{position:fixed;width:5px;height:5px;background:var(--ac);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:background .3s}
#cur-ring{position:fixed;width:28px;height:28px;border:1px solid rgba(var(--ac-rgb),.3);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .2s,height .2s,border-color .3s}

/* NAV */
nav{display:flex;align-items:center;justify-content:space-between;padding:28px 48px;border-bottom:1px solid var(–border);position:relative;z-index:50}
.logo{font-family:‘Instrument Serif’,serif;font-size:19px;color:var(–text);text-decoration:none;letter-spacing:-.01em}
.logo em{font-style:italic;color:var(–ac);transition:color .3s}
.nr{display:flex;align-items:center;gap:16px}
.back{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(–mu);text-decoration:none;display:flex;align-items:center;gap:8px;transition:color .2s}
.back:hover{color:var(–text)}
.cpw{position:relative;display:flex;align-items:center;gap:8px;padding:6px 12px;border:1px solid var(–border);border-radius:3px;cursor:none;transition:border-color .2s}
.cpw:hover{border-color:var(–bh)}
.cpsw{width:11px;height:11px;border-radius:50%;background:var(–ac);transition:background .2s;flex-shrink:0}
.cplb{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(–mu);white-space:nowrap}
input[type=“color”]{position:absolute;inset:0;opacity:0;cursor:none;width:100%;height:100%;border:none}

/* MAIN */
main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 48px;position:relative}

/* SYNC STATUS */
.sync-row{display:flex;align-items:center;gap:8px;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(–mu);margin-bottom:32px;opacity:0;animation:up .6s .2s forwards}
.sdot{width:5px;height:5px;border-radius:50%;background:#f59e0b;animation:blink 1.5s infinite;flex-shrink:0;transition:background .4s}
.sdot.ok{background:#3db87a;box-shadow:0 0 6px rgba(61,184,122,.6)}
.sdot.err{background:#ef4444}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}

/* TIME */
.time-block{text-align:center;margin-bottom:16px;opacity:0;animation:up .8s .4s forwards}
.time-main{font-family:‘Instrument Serif’,serif;font-size:clamp(72px,16vw,180px);font-weight:400;letter-spacing:-.05em;line-height:1;font-variant-numeric:tabular-nums;color:var(–text)}
.time-colon{color:var(–ac);transition:color .3s;animation:cblink 1s steps(1) infinite}
@keyframes cblink{0%,49%{opacity:1}50%,100%{opacity:.15}}
.time-ms{font-size:clamp(16px,3vw,36px);color:var(–ac);opacity:.5;font-variant-numeric:tabular-nums;vertical-align:middle;transition:color .3s;letter-spacing:0}
.date-row{font-size:12px;color:var(–mu);letter-spacing:.15em;text-transform:uppercase;text-align:center;margin-bottom:56px;opacity:0;animation:up .6s .6s forwards}

/* INFO STRIP */
.info-strip{display:flex;gap:1px;background:var(–border);border:1px solid var(–border);border-radius:5px;overflow:hidden;margin-bottom:48px;width:100%;max-width:640px;opacity:0;animation:up .6s .8s forwards}
.ic{background:var(–bg1);padding:20px 24px;flex:1;text-align:center;transition:background .2s;min-width:0}
.ic:hover{background:var(–bg2)}
.icl{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(–mu);margin-bottom:6px;white-space:nowrap}
.icv{font-size:15px;font-weight:500;color:var(–text);font-variant-numeric:tabular-nums;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.icv.ac{color:var(–ac);transition:color .3s}

/* WORLD CLOCKS */
.wc-title{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(–mu);margin-bottom:16px;opacity:0;animation:up .6s 1s forwards;align-self:flex-start}
.wc-row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;width:100%;max-width:640px;opacity:0;animation:up .6s 1.1s forwards}
.wc{background:var(–bg1);border:1px solid var(–border);border-radius:4px;padding:16px 20px;text-align:center;flex:1;min-width:100px;transition:all .2s}
.wc:hover{border-color:var(–bh);transform:translateY(-2px)}
.wcc{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(–mu);margin-bottom:5px}
.wct{font-family:‘Instrument Serif’,serif;font-size:20px;font-weight:400;color:var(–text);font-variant-numeric:tabular-nums}
.wco{font-size:10px;color:var(–mu);margin-top:3px}

/* FOOTER */
footer{border-top:1px solid var(–border);padding:24px 48px;display:flex;justify-content:space-between;align-items:center;position:relative;z-index:50}
footer span,footer a{font-size:11px;color:var(–mu);text-decoration:none;letter-spacing:.04em}
.egg{width:5px;height:5px;background:var(–bg2);border-radius:50%;opacity:.01;transition:opacity .5s,background .3s;cursor:none;display:inline-block}
.egg:hover{opacity:1;background:var(–ac)}
@keyframes up{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}

@media(max-width:768px){
nav{padding:20px 24px}.cplb{display:none}
main{padding:40px 20px}
footer{padding:20px 24px;flex-wrap:wrap;gap:10px}
.ic{padding:14px 12px}
}
</style>

</head>
<body>

<div id="cur"></div>
<div id="cur-ring"></div>

<nav>
  <a href="/" class="logo">span<em>ani</em></a>
  <div class="nr">
    <a href="/" class="back">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M8 2L4 6l4 4" stroke="currentColor" stroke-width="1.4"/></svg>
      portfolio
    </a>
    <div class="cpw">
      <div class="cpsw" id="sw"></div>
      <span class="cplb">color</span>
      <input type="color" id="cp" value="#e2e2e2">
    </div>
  </div>
</nav>

<main>
  <div class="sync-row">
    <div class="sdot" id="sdot"></div>
    <span id="syncStatus">syncing with ntp servers…</span>
  </div>

  <div class="time-block">
    <div class="time-main">
      <span id="H">--</span><span class="time-colon">:</span><span id="M">--</span><span class="time-colon">:</span><span id="S">--</span><span class="time-ms">.<span id="MS">---</span></span>
    </div>
  </div>

  <div class="date-row" id="dateRow">— — —</div>

  <div class="info-strip">
    <div class="ic"><div class="icl">Timezone</div><div class="icv ac" id="infoTz">—</div></div>
    <div class="ic"><div class="icl">UTC Offset</div><div class="icv" id="infoOff">—</div></div>
    <div class="ic"><div class="icl">Latency</div><div class="icv" id="infoLat">—</div></div>
    <div class="ic"><div class="icl">Accuracy</div><div class="icv ac" id="infoAcc">—</div></div>
  </div>

  <div class="wc-title">world clocks · atomic time</div>
  <div class="wc-row">
    <div class="wc"><div class="wcc">New York</div><div class="wct" id="wny">--:--</div><div class="wco">UTC−4</div></div>
    <div class="wc"><div class="wcc">London</div><div class="wct" id="wlon">--:--</div><div class="wco">UTC+1</div></div>
    <div class="wc"><div class="wcc">Berlin</div><div class="wct" id="wber">--:--</div><div class="wco">UTC+2</div></div>
    <div class="wc"><div class="wcc">Tokyo</div><div class="wct" id="wtok">--:--</div><div class="wco">UTC+9</div></div>
    <div class="wc"><div class="wcc">Sydney</div><div class="wct" id="wsyd">--:--</div><div class="wco">UTC+10</div></div>
  </div>
</main>

<footer>
  <a href="/">spanani.de</a>
  <span>atomic time · ntp synced · your region</span>
  <a href="https://x.gd/CYVD6" target="_blank" class="egg" tabindex="-1" aria-hidden="true"></a>
</footer>

<script>
// COLOR PICKER — shared with portfolio
const cp=document.getElementById('cp'),sw=document.getElementById('sw'),root=document.documentElement;
function h2r(h){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return r+','+g+','+b}
function applyColor(hex){root.style.setProperty('--ac',hex);root.style.setProperty('--ac-rgb',h2r(hex));sw.style.background=hex;cp.value=hex;try{localStorage.setItem('spa-ac',hex)}catch(e){}}
try{const s=localStorage.getItem('spa-ac');if(s)applyColor(s)}catch(e){}
cp.addEventListener('input',e=>applyColor(e.target.value));

// CURSOR
const cur=document.getElementById('cur'),ring=document.getElementById('cur-ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cur.style.left=mx+'px';cur.style.top=my+'px'});
(function l(){rx+=(mx-rx)*.13;ry+=(my-ry)*.13;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(l)})();
document.querySelectorAll('a,button,.cpw,.wc').forEach(el=>{
  el.addEventListener('mouseenter',()=>{ring.style.width='44px';ring.style.height='44px'});
  el.addEventListener('mouseleave',()=>{ring.style.width='28px';ring.style.height='28px'});
});

// NTP ATOMIC CLOCK
let ntpOffset=0, latMs=0, synced=false;
let userTz=Intl.DateTimeFormat().resolvedOptions().timeZone;

async function syncNTP(){
  const dot=document.getElementById('sdot');
  const status=document.getElementById('syncStatus');
  dot.className='sdot';
  status.textContent='syncing with ntp servers…';

  const samples=[];
  // Multiple round-trips for precision
  for(let i=0;i<5;i++){
    try{
      const t0=Date.now();
      const res=await fetch('https://worldtimeapi.org/api/ip?_='+Date.now());
      const t1=Date.now();
      if(!res.ok)continue;
      const d=await res.json();
      const rtt=t1-t0;
      const srv=new Date(d.datetime).getTime();
      const offset=(srv+rtt/2)-t1;
      userTz=d.timezone||userTz;
      samples.push({offset,rtt});
    }catch(e){}
  }

  if(!samples.length){
    // Fallback to timeapi.io
    try{
      const t0=Date.now();
      const res=await fetch('https://timeapi.io/api/time/current/zone?timeZone=UTC');
      const t1=Date.now();
      const d=await res.json();
      const srv=new Date(d.dateTime+'Z').getTime();
      ntpOffset=(srv+(t1-t0)/2)-t1;
      latMs=Math.round((t1-t0)/2);
      synced=true;
    }catch(e){
      dot.className='sdot err';
      status.textContent='ntp unavailable — device time';
      document.getElementById('infoAcc').textContent='device';
      return;
    }
  } else {
    // Sort by RTT — use minimum RTT sample (least clock skew)
    samples.sort((a,b)=>a.rtt-b.rtt);
    // Reject outliers beyond 2x median RTT
    const medRtt=samples[Math.floor(samples.length/2)].rtt;
    const good=samples.filter(s=>s.rtt<=medRtt*2);
    // Average offsets from good samples
    ntpOffset=Math.round(good.reduce((sum,s)=>sum+s.offset,0)/good.length);
    latMs=Math.round(samples[0].rtt/2);
    synced=true;
  }

  dot.className='sdot ok';
  status.textContent='synced · '+userTz;

  // Info strip
  document.getElementById('infoTz').textContent=userTz;
  const rawOff=new Date().getTimezoneOffset();
  const h=Math.abs(Math.floor(rawOff/60)),m=Math.abs(rawOff%60);
  const sign=rawOff<=0?'+':'−';
  document.getElementById('infoOff').textContent='UTC'+sign+String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');
  document.getElementById('infoLat').textContent=latMs+'ms';
  document.getElementById('infoAcc').textContent=latMs<20?'±5ms':latMs<60?'±20ms':latMs<120?'±50ms':'±100ms';
}

// World clock helpers
const WC_OFFSETS={wny:-4*60,wlon:1*60,wber:2*60,wtok:9*60,wsyd:10*60};
function tzTime(base,offMin){
  const utc=base.getTime()+base.getTimezoneOffset()*60000;
  const l=new Date(utc+offMin*60000);
  return String(l.getHours()).padStart(2,'0')+':'+String(l.getMinutes()).padStart(2,'0');
}

const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];

// High-precision millisecond tick using setTimeout remainder
function tick(){
  const now=new Date(Date.now()+ntpOffset);
  document.getElementById('H').textContent=String(now.getHours()).padStart(2,'0');
  document.getElementById('M').textContent=String(now.getMinutes()).padStart(2,'0');
  document.getElementById('S').textContent=String(now.getSeconds()).padStart(2,'0');
  document.getElementById('MS').textContent=String(now.getMilliseconds()).padStart(3,'0');
  document.getElementById('dateRow').textContent=DAYS[now.getDay()]+', '+now.getDate()+' '+MONTHS[now.getMonth()]+' '+now.getFullYear();
  for(const[id,off] of Object.entries(WC_OFFSETS)){
    const el=document.getElementById(id);
    if(el)el.textContent=tzTime(now,off);
  }
  // Schedule next tick precisely at next millisecond boundary
  const ms=Date.now()+ntpOffset;
  setTimeout(tick,1-(ms%1)||1);
}

// Init
syncNTP().then(()=>{
  tick();
  setInterval(syncNTP,5*60*1000); // re-sync every 5 min
});
</script>

</body>
</html>
