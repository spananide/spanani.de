<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Matti Sonnenschein – Handy-Hilfe für Senioren</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      line-height: 1.65;
      font-size: 20px;
      min-height: 100vh;
    }
    
    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 25px;
    }
    
    header {
      background: rgba(20, 20, 20, 0.65);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 90px 0 70px;
      text-align: center;
      
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 1.3s ease-out, transform 1.6s ease-out;
    }
    
    header.visible {
      opacity: 1;
      transform: translateY(0);
    }
    
    h1 {
      font-size: 3.6rem;
      font-weight: 600;
      color: #ffffff;
      margin-bottom: 12px;
    }
    
    h2 {
      font-size: 2.5rem;
      font-weight: 500;
      color: #f0f0f0;
      margin: 80px 0 40px;
      text-align: center;
    }
    
    .subtitle {
      font-size: 1.55rem;
      color: #bbbbbb;
      margin-bottom: 35px;
      font-weight: 300;
    }
    
    .cta-button {
      display: inline-block;
      background: rgba(40, 40, 40, 0.9);
      color: #ffffff;
      font-size: 1.5rem;
      font-weight: 500;
      padding: 18px 50px;
      border-radius: 12px;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(8px);
      transition: all 0.3s ease;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    
    .cta-button:hover {
      background: rgba(60, 60, 60, 0.95);
      transform: translateY(-4px);
      border-color: rgba(255,255,255,0.25);
    }
    
    .glass-card {
      background: rgba(30, 30, 30, 0.55);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 35px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.35);
      
      opacity: 0;
      transform: translateY(50px);
      transition: opacity 1.1s ease-out, transform 1.4s ease-out;
    }
    
    .glass-card.visible {
      opacity: 1;
      transform: translateY(0);
    }
    
    .services {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 32px;
      margin: 50px 0;
    }
    
    .service-card h3 {
      font-size: 1.8rem;
      color: #ffffff;
      margin-bottom: 16px;
      font-weight: 500;
    }
    
    .service-card p {
      color: #cccccc;
      font-size: 1.12rem;
    }
    
    .prices table {
      width: 100%;
      border-collapse: collapse;
      font-size: 1.15rem;
      margin: 40px 0;
      color: #dddddd;
    }
    
    .prices th, .prices td {
      padding: 18px 20px;
      border: 1px solid rgba(255,255,255,0.06);
      text-align: left;
    }
    
    .prices th {
      background: rgba(40,40,40,0.4);
      color: #ffffff;
      font-weight: 500;
    }
    
    .about {
      text-align: center;
      padding: 60px 0;
    }
    
    .about img {
      width: 240px;
      height: 240px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid rgba(255,255,255,0.14);
      margin-bottom: 35px;
      box-shadow: 0 12px 48px rgba(0,0,0,0.55);
    }
    
    .contact-form {
      max-width: 720px;
      margin: 50px auto;
      padding: 45px;
    }
    
    label {
      display: block;
      margin: 24px 0 10px;
      font-size: 1.15rem;
      font-weight: 500;
      color: #eeeeee;
    }
    
    input, textarea {
      width: 100%;
      padding: 15px 18px;
      font-size: 1.1rem;
      background: rgba(40,40,40,0.6);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      color: white;
      backdrop-filter: blur(8px);
    }
    
    input:focus, textarea:focus {
      outline: none;
      border-color: rgba(255,255,255,0.3);
    }
    
    footer {
      background: #000000;
      color: #888888;
      text-align: center;
      padding: 70px 0 50px;
      font-size: 1rem;
      border-top: 1px solid rgba(255,255,255,0.05);
    }
    
    footer a {
      color: #bbbbbb;
      text-decoration: none;
    }
    
    footer a:hover {
      color: #ffffff;
    }
    
    @media (max-width: 768px) {
      h1 { font-size: 2.8rem; }
      h2 { font-size: 2.2rem; }
      .about img { width: 200px; height: 200px; }
      body { font-size: 18px; }
    }
  </style>
</head>
<body>

<header>
  <div class="container">
    <h1>Matti Sonnenschein</h1>
    <div class="subtitle">Handy- & Technik-Hilfe für Senioren – geduldig & verständlich</div>
    
    <p style="font-size:1.4rem; max-width:720px; margin:0 auto 45px; color:#cccccc;">
